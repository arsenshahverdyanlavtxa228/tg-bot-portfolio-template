# fly.io config — rename `app` after running `fly apps create <your-name>`.
app = "tg-bot-portfolio"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_URL = "sqlite+aiosqlite:////app/data/bot.db"
  MEDIA_DIR = "/app/media"
  DEFAULT_LOCALE = "ru"
  LOG_LEVEL = "INFO"

[[mounts]]
  source = "bot_data"
  destination = "/app/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[processes]
  app = "python -m bot"

# No HTTP service — bot uses long-polling.
