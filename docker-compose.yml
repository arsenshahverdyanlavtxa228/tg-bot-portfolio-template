services:
  bot:
    build: .
    image: tg-bot-portfolio-template:latest
    container_name: tg-bot-portfolio
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override so paths map to mounted volumes inside the container.
      DATABASE_URL: sqlite+aiosqlite:////app/data/bot.db
      MEDIA_DIR: /app/media
    volumes:
      - ./data:/app/data
      - ./media:/app/media
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
